name: 🐍 Generar Snake de contribuciones

on:
  schedule:
    # Cada 3 días a las 05:00 UTC (00:00 Colombia) — cadencia óptima sin saturar la API
    - cron: "0 5 */3 * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      # Solo se re-ejecuta en push si cambia este workflow (evita cascadas
      # cuando metrics.yml o el workflow de actividad commitean a main)
      - ".github/workflows/snake.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generar animación snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#7aa2f7

      - name: Publicar en la rama output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
