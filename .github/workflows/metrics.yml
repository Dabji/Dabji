name: 📊 Métricas avanzadas del perfil

on:
  schedule:
    # Cada 3 días a las 05:30 UTC (00:30 Colombia), desfasado del snake
    - cron: "30 5 */3 * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      # Validación automática cuando se modifica este workflow.
      # El commit de metrics.svg (hecho con el PAT) NO re-dispara nada
      # gracias a este filtro de paths.
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generar metrics.svg
        uses: lowlighter/metrics@latest
        with:
          # Secret METRICS_TOKENS: PAT classic con scopes repo + read:user
          # (incluye estadísticas de repositorios privados)
          token: ${{ secrets.METRICS_TOKENS }}
          user: Dabji
          template: classic
          filename: metrics.svg
          committer_branch: main
          config_timezone: America/Bogota
          config_display: large

          # Secciones base
          base: header, activity, community, repositories, metadata

          # Lenguajes más usados (incluye repos privados gracias al PAT)
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_indepth: yes
          plugin_languages_ignored: jupyter notebook, html

          # Nota: el plugin de hábitos (plugin_habits) se eliminó porque la API de
          # eventos de GitHub devolvía datos incompletos y rompía el SVG con
          # "Recent coding habits - unexpected error".

          # Calendario isométrico de contribuciones
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
